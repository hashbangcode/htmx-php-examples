<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>

    <script src="/js/htmx.min.js"></script>
    <meta name="htmx-config" content='{"defaultSwapStyle":"outerHTML"}'>
    <script>
        htmx.config.defaultSwapStyle = 'outerHTML';
    </script>
    <style>
        p {
            opacity: 1;
            transition: opacity 0.5s ease-in;
        }
        p.htmx-added {
            opacity: 0;
        }
    </style>
</head>
<body>
<h1><a href="/">HTMX PHP Demos</a></h1>

<p>Here we are setting the default swap behavior to be outerHTML, which will replace the entirety of the div with the result from the server.</p>

<button hx-put="index.php" hx-target="#request-output">Send Request</button>

<div id="request-output"></div>

</body>
</html>
