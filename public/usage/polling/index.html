<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>

    <script src="/js/htmx.min.js"></script>
    <link rel="stylesheet" href="/css/styles.css">
    <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
<h1><a href="/">HTMX PHP Demos</a></h1>
<h2>Polling</h2>

<div id="polling"
     hx-get="index.php"
     hx-trigger="load, every 2s"
     hx-target="this">
    <div>
        <span>Rolled a .</span>
    </div>
</div>

<div class="description">
    <p>This makes use of the "hx-trigger" attribute with the value "load, every
        2s".</p>
    <p>This will poll an endpoint every 2 seconds and roll a die. If the number
        rolled is 6 then the polling is stopped by issuing a 286 HTTP response
        header.</p>
</div>

</body>
</html>
