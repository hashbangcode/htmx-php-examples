<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>

    <script src="/js/htmx.min.js"></script>
</head>
<body>
<h1><a href="/">HTMX PHP Demos</a></h1>

<p>This will poll an endpoint every 3 seconds. There is a 50% chance that
the endpoint will respond with a 286 response code, which will stop the
polling.</p>

<div id="polling"
     hx-get="index.php"
     hx-trigger="every 2s"
     hx-target="this"
     hx-swap="innerHTML"><div>
    <span>Loading...</span>
</div></div>

</body>
</html>
